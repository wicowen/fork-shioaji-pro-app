name: Release Desktop App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  SHIOAJI_VERSION: v1.5.2

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            sidecar: macOS-aarch64.tar.gz
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            target: x86_64-apple-darwin
            sidecar: macOS-x86_64.tar.gz
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar: Linux-x86_64.tar.gz
            args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar: Windows-x86_64.zip
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - name: Download shioaji sidecar (unix)
        if: matrix.platform != 'windows-latest'
        run: |
          mkdir -p src-tauri/binaries
          curl -fsSL -o sidecar.tar.gz \
            "https://github.com/sinotrade/shioaji/releases/download/${SHIOAJI_VERSION}/shioaji-${SHIOAJI_VERSION}-${{ matrix.sidecar }}"
          tar xzf sidecar.tar.gz
          mv shioaji "src-tauri/binaries/shioaji-${{ matrix.target }}"
          chmod +x "src-tauri/binaries/shioaji-${{ matrix.target }}"

      - name: Download shioaji sidecar (windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Invoke-WebRequest -Uri "https://github.com/sinotrade/shioaji/releases/download/$env:SHIOAJI_VERSION/shioaji-$env:SHIOAJI_VERSION-${{ matrix.sidecar }}" -OutFile sidecar.zip
          Expand-Archive sidecar.zip -DestinationPath sidecar-extract
          Move-Item sidecar-extract/shioaji.exe "src-tauri/binaries/shioaji-${{ matrix.target }}.exe"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Tauri treats a present-but-empty APPLE_ID as "please notarize", so the
      # notarization env is only injected when real credentials exist.
      - name: Enable notarization (when credentials are configured)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          if [ -n "${{ secrets.APPLE_ID }}" ] && [ -n "${{ secrets.APPLE_PASSWORD }}" ]; then
            {
              echo "APPLE_ID=${{ secrets.APPLE_ID }}"
              echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}"
              echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
            } >> "$GITHUB_ENV"
            echo "Notarization enabled"
          else
            echo "Notarization credentials not set — signing only"
          fi

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code-signing (notarization env is injected by the step
          # above only when credentials are configured)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Shioaji Pro ${{ github.ref_name }}'
          releaseBody: |
            Shioaji Pro 桌面版 — 內建 shioaji server（sidecar）、伺服器管理介面、
            系統匣（menu bar）、自動更新。下載對應平台的安裝檔即可使用。

            macOS: .dmg ｜ Windows: .msi / .exe ｜ Linux: .AppImage / .deb / .rpm
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release (all platforms assembled)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit '${{ github.ref_name }}'             --repo '${{ github.repository }}' --draft=false
